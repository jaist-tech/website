name: CI

on: [push, pull_request]

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build the app
        run: npm run build
